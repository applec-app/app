    <script>
const el = document.getElementById("mapamundi");

let scale = 1;
let posX = 0;
let posY = 0;

let startX = 0;
let startY = 0;

let isDragging = false;

// 👉 DRAG (mouse + touch)
function startDrag(x, y) {
    isDragging = true;
    startX = x - posX;
    startY = y - posY;
}

function moveDrag(x, y) {
    if (!isDragging) return;
    posX = x - startX;
    posY = y - startY;
    updateTransform();
}

function endDrag() {
    isDragging = false;
}

// 👉 ZOOM con rueda (desktop)
el.addEventListener("wheel", (e) => {
    e.preventDefault();
    scale += e.deltaY * -0.01;
    scale = Math.min(Math.max(0.5, scale), 4);
    updateTransform();
});

// 👉 TOUCH EVENTS
let initialDistance = null;

el.addEventListener("touchstart", (e) => {
    if (e.touches.length === 1) {
        startDrag(e.touches[0].clientX, e.touches[0].clientY);
    }

    // pinch zoom
    if (e.touches.length === 2) {
        initialDistance = getDistance(e.touches);
    }
});

el.addEventListener("touchmove", (e) => {
    e.preventDefault();

    if (e.touches.length === 1 && isDragging) {
        moveDrag(e.touches[0].clientX, e.touches[0].clientY);
    }

    // pinch zoom
    if (e.touches.length === 2) {
        let newDistance = getDistance(e.touches);
        let delta = newDistance - initialDistance;

        scale += delta * 0.005;
        scale = Math.min(Math.max(0.5, scale), 4);

        initialDistance = newDistance;
        updateTransform();
    }

}, { passive: false });

el.addEventListener("touchend", () => {
    endDrag();
    initialDistance = null;
});

// 👉 MOUSE EVENTS
el.addEventListener("mousedown", (e) => startDrag(e.clientX, e.clientY));
document.addEventListener("mousemove", (e) => moveDrag(e.clientX, e.clientY));
document.addEventListener("mouseup", endDrag);

// 👉 Función para aplicar transformaciones
function updateTransform() {
    el.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
}

// 👉 distancia entre dos dedos
function getDistance(touches) {
    let dx = touches[0].clientX - touches[1].clientX;
    let dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
}
</script>
